{% extends 'layout/base.html' %}
{% block title %}Crear usuario{% endblock %}
{% block page_title %}Crear usuario{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-person-add me-2"></i>Crear usuario</h1>
    <a href="{% url 'admin_users' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver a usuarios</a>
  </div>
</div>

<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3" novalidate>
        {% csrf_token %}

        <div class="col-md-6">
          <label class="form-label" for="nombre">Nombre</label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            name="nombre"
            value="{{ posted.nombre|default:'' }}"
            required
            maxlength="100"
          >
        </div>
        <div class="col-md-6">
          <label class="form-label" for="apellido">Apellido</label>
          <input
            type="text"
            class="form-control"
            id="apellido"
            name="apellido"
            value="{{ posted.apellido|default:'' }}"
            required
            maxlength="100"
          >
        </div>

        <div class="col-12">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            value="{{ posted.email|default:'' }}"
            required
            maxlength="100"
          >
        </div>

        <div class="col-md-6">
          <label class="form-label" for="rol">Rol</label>
          <select class="form-select" id="rol" name="rol">
            <option value="">— Sin rol —</option>
            {% for r in roles %}
              <option value="{{ r.id_rol }}" {% if posted.rol|default:'' == r.id_rol|stringformat:"s" %}selected{% endif %}>{{ r.nombre }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6 d-flex flex-wrap align-items-end gap-3 pb-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="activo" name="activo" value="1" {% if posted.activo %}checked{% endif %}>
            <label class="form-check-label" for="activo">Activo</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="is_staff" name="is_staff" value="1" {% if posted.is_staff %}checked{% endif %}>
            <label class="form-check-label" for="is_staff">Staff</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="is_superuser" name="is_superuser" value="1" {% if posted.is_superuser %}checked{% endif %}>
            <label class="form-check-label" for="is_superuser">Superusuario</label>
          </div>
        </div>

        <div class="col-12">
          <hr class="border-secondary">
        </div>

        <div class="col-12">
          <p class="text-muted small mb-2">Contraseña (mínimo 8 caracteres)</p>
        </div>

        <div class="col-md-6">
          <label class="form-label" for="password1">Contraseña</label>
          <input type="password" class="form-control" id="password1" name="password1" autocomplete="new-password" required minlength="8">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="password2">Repetir contraseña</label>
          <input type="password" class="form-control" id="password2" name="password2" autocomplete="new-password" required minlength="8">
        </div>

        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold">
            <i class="bi bi-check2 me-1"></i>Crear usuario
          </button>
          <a href="{% url 'admin_users' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
