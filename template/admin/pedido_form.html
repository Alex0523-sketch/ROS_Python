{% extends 'layout/base.html' %}
{% block title %}Nuevo pedido{% endblock %}
{% block page_title %}Nuevo pedido{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-cart-plus me-2"></i>Nuevo pedido</h1>
    <a href="{% url 'admin_pedidos' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver a pedidos</a>
  </div>
</div>
<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3" novalidate>
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label" for="cliente_nombre">Nombre del cliente <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="cliente_nombre" name="cliente_nombre" required maxlength="100" value="{% if posted %}{{ posted.cliente_nombre }}{% endif %}">
        </div>
        <div class="col-md-3">
          <label class="form-label" for="total">Total</label>
          <input type="text" class="form-control" id="total" name="total" required inputmode="decimal" placeholder="0.00" value="{% if posted %}{{ posted.total }}{% endif %}">
        </div>
        <div class="col-md-3">
          <label class="form-label" for="estado">Estado</label>
          <select class="form-select" id="estado" name="estado" required>
            {% for val, label in estados %}
            <option value="{{ val }}" {% if posted and posted.estado == val %}selected{% elif not posted and val == 'PENDIENTE' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="numero_mesa">Número de mesa</label>
          <input type="text" class="form-control" id="numero_mesa" name="numero_mesa" maxlength="10" value="{% if posted %}{{ posted.numero_mesa }}{% endif %}">
        </div>
        <div class="col-md-4">
          <label class="form-label" for="user_id">Cliente (usuario)</label>
          <select class="form-select" id="user_id" name="user_id">
            <option value="">— Ninguno —</option>
            {% for u in clientes %}
            <option value="{{ u.id_user }}" {% if posted and posted.user_id == u.id_user|stringformat:"s" %}selected{% endif %}>{{ u.nombre }} {{ u.apellido }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="empleado_id">Empleado asignado</label>
          <select class="form-select" id="empleado_id" name="empleado_id">
            <option value="">— Ninguno —</option>
            {% for e in empleados %}
            <option value="{{ e.id_user }}" {% if posted and posted.empleado_id == e.id_user|stringformat:"s" %}selected{% endif %}>{{ e.nombre }} {{ e.apellido }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="reserva_id">Reserva (opcional)</label>
          <select class="form-select" id="reserva_id" name="reserva_id">
            <option value="">— Sin reserva —</option>
            {% for r in reservas %}
            <option value="{{ r.id }}" {% if posted and posted.reserva_id == r.id|stringformat:"s" %}selected{% endif %}>#{{ r.id }} · {% if r.codigo_reserva %}{{ r.codigo_reserva|truncatechars:15 }}{% else %}sin código{% endif %} · {{ r.fecha_reserva|date:"d/m/Y" }}{% if r.hora %} · {{ r.hora }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label" for="comentarios">Comentarios</label>
          <textarea class="form-control" id="comentarios" name="comentarios" rows="2" maxlength="500">{% if posted %}{{ posted.comentarios }}{% endif %}</textarea>
        </div>
        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Crear pedido</button>
          <a href="{% url 'admin_pedidos' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
