{% extends 'layout/base.html' %}
{% block title %}Nueva noticia{% endblock %}
{% block page_title %}Nueva noticia{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-newspaper me-2"></i>Publicar noticia</h1>
    <a href="{% url 'noticias' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Ver noticias (sitio)</a>
  </div>
</div>
<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data" class="row g-3" novalidate>
        {% csrf_token %}
        <div class="col-12">
          <label class="form-label" for="titulo">Título <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="titulo" name="titulo" required maxlength="150" value="{% if posted %}{{ posted.titulo }}{% endif %}">
        </div>
        <div class="col-md-4">
          <label class="form-label" for="fecha_publicacion">Fecha de publicación</label>
          <input type="date" class="form-control" id="fecha_publicacion" name="fecha_publicacion" value="{% if posted %}{{ posted.fecha_publicacion }}{% endif %}">
          <small class="text-muted">Vacío = hoy.</small>
        </div>
        <div class="col-12">
          <label class="form-label" for="contenido">Contenido <span class="text-danger">*</span></label>
          <textarea class="form-control" id="contenido" name="contenido" rows="8" required>{% if posted %}{{ posted.contenido }}{% endif %}</textarea>
        </div>
        <div class="col-12"><hr class="border-secondary"></div>
        <div class="col-md-6">
          <label class="form-label" for="imagen">Imagen</label>
          <input type="file" class="form-control" id="imagen" name="imagen" accept=".jpg,.jpeg,.png,.gif,.webp,image/*">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="imagen_url">O URL de imagen</label>
          <input type="url" class="form-control" id="imagen_url" name="imagen_url" value="{% if posted %}{{ posted.imagen_url }}{% endif %}" placeholder="https://...">
        </div>
        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Publicar</button>
          <a href="{% url 'noticias' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
