{% extends 'layout/base.html' %}
{% block title %}Editar categoría{% endblock %}
{% block page_title %}Editar categoría{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-tags me-2"></i>Editar categoría</h1>
    <a href="{% url 'admin_categorias' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  </div>
</div>
<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12">
          <label class="form-label" for="nombre">Nombre</label>
          <input type="text" class="form-control" id="nombre" name="nombre" value="{{ edit_categoria.nombre }}" required maxlength="100">
        </div>
        <div class="col-12">
          <label class="form-label" for="descripcion">Descripción</label>
          <textarea class="form-control" id="descripcion" name="descripcion" rows="3" maxlength="255" placeholder="Opcional">{{ edit_categoria.descripcion|default:'' }}</textarea>
        </div>
        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Guardar</button>
          <a href="{% url 'admin_categorias' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
