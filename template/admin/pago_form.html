{% extends 'layout/base.html' %}
{% block title %}Nuevo pago{% endblock %}
{% block page_title %}Nuevo pago{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-credit-card-2-front me-2"></i>Nuevo pago</h1>
    <a href="{% url 'admin_pagos' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver a pagos</a>
  </div>
</div>
<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3" novalidate>
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label" for="pedido_id">Pedido <span class="text-danger">*</span></label>
          <select class="form-select" id="pedido_id" name="pedido_id" required>
            <option value="">— Selecciona —</option>
            {% for p in pedidos %}
            <option value="{{ p.id }}" {% if posted and posted.pedido_id == p.id|stringformat:"s" %}selected{% endif %}>#{{ p.id }} · {{ p.cliente_nombre|default:"—" }} · S/ {{ p.total }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="monto_total">Monto</label>
          <input type="text" class="form-control" id="monto_total" name="monto_total" required inputmode="decimal" value="{% if posted %}{{ posted.monto_total }}{% endif %}">
        </div>
        <div class="col-md-3">
          <label class="form-label" for="fecha_pago">Fecha de pago</label>
          <input type="date" class="form-control" id="fecha_pago" name="fecha_pago" value="{% if posted %}{{ posted.fecha_pago }}{% endif %}">
          <small class="text-muted">Si la dejas vacía, se usa la fecha de hoy.</small>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="metodo_pago">Método</label>
          <select class="form-select" id="metodo_pago" name="metodo_pago" required>
            {% for val, label in metodos %}
            <option value="{{ val }}" {% if posted and posted.metodo_pago == val %}selected{% elif not posted and val == 'EFECTIVO' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="estado">Estado</label>
          <select class="form-select" id="estado" name="estado" required>
            {% for val, label in estados %}
            <option value="{{ val }}" {% if posted and posted.estado == val %}selected{% elif not posted and val == 'PENDIENTE' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="user_id">Usuario (opcional)</label>
          <select class="form-select" id="user_id" name="user_id">
            <option value="">— Ninguno —</option>
            {% for u in clientes %}
            <option value="{{ u.id_user }}" {% if posted and posted.user_id == u.id_user|stringformat:"s" %}selected{% endif %}>{{ u.nombre }} {{ u.apellido }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Registrar pago</button>
          <a href="{% url 'admin_pagos' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
