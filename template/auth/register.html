{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Crear cuenta — Olla y Sazón</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: radial-gradient(ellipse at top, #4a4a4a 0%, #1e1e1e 55%, #121212 100%);
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(165deg, rgba(58, 58, 58, 0.95) 0%, rgba(35, 35, 35, 0.98) 100%);
      border: 1px solid rgba(255, 215, 0, 0.35);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
      overflow: hidden;
    }
    .auth-card-header {
      text-align: center;
      padding: 1.75rem 1.75rem 1rem;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.08) 0%, transparent 100%);
    }
    .auth-card-header .brand-icon {
      font-size: 2.5rem;
      color: #ffd700;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .auth-card-header h1 {
      color: #ffd700;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
    }
    .auth-card-header .subtitle {
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.9rem;
      margin: 0;
      line-height: 1.45;
    }
    .auth-card-body {
      padding: 1.5rem 1.75rem 1.75rem;
    }
    .auth-card-body .form-label {
      color: rgba(255, 255, 255, 0.92);
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 0.35rem;
    }
    .auth-card-body .input-group-text {
      background: linear-gradient(180deg, #ffd700 0%, #e6c200 100%) !important;
      border-color: #ffd700 !important;
      color: #1a1a1a !important;
    }
    .auth-card-body .form-control {
      background: rgba(255, 255, 255, 0.96);
      border-color: rgba(255, 215, 0, 0.35);
      color: #1a1a1a;
      font-size: 0.98rem;
    }
    .auth-card-body .form-control:focus {
      border-color: #ffd700;
      box-shadow: 0 0 0 0.2rem rgba(255, 215, 0, 0.25);
    }
    .btn-auth-primary {
      background: linear-gradient(180deg, #ffd700 0%, #e6c200 100%);
      border: none;
      color: #1a1a1a !important;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    .btn-auth-primary:hover {
      background: linear-gradient(180deg, #ffe033 0%, #ffd700 100%);
      color: #0d0d0d !important;
    }
    .btn-auth-link {
      color: rgba(255, 255, 255, 0.85) !important;
      border-color: rgba(255, 255, 255, 0.25) !important;
    }
    .hint {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="brand-icon"><i class="bi bi-person-plus"></i></div>
      <h1>Crear cuenta</h1>
      <p class="subtitle">Regístrate como cliente para reservar, pedir y ver tu perfil.</p>
    </div>
    <div class="auth-card-body">
      {% if messages %}
      {% for message in messages %}
      <div class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% elif 'warning' in message.tags %}alert-warning{% else %}alert-info{% endif %} py-2 mb-3">{{ message }}</div>
      {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label class="form-label" for="nombre">Nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required maxlength="100" value="{% if posted %}{{ posted.nombre }}{% endif %}" autocomplete="given-name"/>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="apellido">Apellido</label>
            <input type="text" class="form-control" id="apellido" name="apellido" required maxlength="100" value="{% if posted %}{{ posted.apellido }}{% endif %}" autocomplete="family-name"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" class="form-control" id="email" name="email" required value="{% if posted %}{{ posted.email }}{% endif %}" autocomplete="email"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres"/>
          </div>
          <p class="hint mt-1 mb-0">Al menos 8 caracteres.</p>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password2">Confirmar contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="password2" name="password2" required minlength="8" autocomplete="new-password"/>
          </div>
        </div>
        <button type="submit" class="btn btn-auth-primary w-100 mb-3">
          <i class="bi bi-check2-circle me-2"></i>Registrarme
        </button>
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm btn-auth-link w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Ya tengo cuenta — iniciar sesión
        </a>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  window.addEventListener('pageshow', function(event) {
    var backForward = false;
    try {
      var nav = performance.getEntriesByType('navigation')[0];
      if (nav && nav.type === 'back_forward') backForward = true;
    } catch (e) {}
    if (!backForward && window.performance && window.performance.navigation) {
      try { backForward = window.performance.navigation.type === 2; } catch (e2) {}
    }
    if (event.persisted || backForward) {
      window.location.reload();
    }
  });
</script>
</body>
</html>
