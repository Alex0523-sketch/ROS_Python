{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private">
  <title>{% block title %}Olla y Sazón{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: radial-gradient(ellipse at top, #4a4a4a 0%, #1e1e1e 55%, #121212 100%);
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(165deg, rgba(58, 58, 58, 0.95) 0%, rgba(35, 35, 35, 0.98) 100%);
      border: 1px solid rgba(255, 215, 0, 0.35);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
      overflow: hidden;
    }
    .auth-card-header {
      text-align: center;
      padding: 2rem 1.75rem 1.25rem;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.08) 0%, transparent 100%);
    }
    .auth-card-header .brand-icon { font-size: 3rem; color: #ffd700; line-height: 1; margin-bottom: 0.75rem; filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.35)); }
    .auth-card-header h1 { color: #ffd700; font-size: 1.65rem; font-weight: 700; margin: 0 0 0.35rem; letter-spacing: 0.03em; }
    .auth-card-header .subtitle { color: rgba(255, 255, 255, 0.78); font-size: 0.95rem; margin: 0; line-height: 1.45; }
    .auth-card-body { padding: 1.75rem; }
    .auth-card-body .form-label { color: rgba(255, 255, 255, 0.92); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.4rem; }
    .auth-card-body .input-group-text {
      background: linear-gradient(180deg, #ffd700 0%, #e6c200 100%) !important;
      border-color: #ffd700 !important;
      color: #1a1a1a !important;
    }
    .auth-card-body .form-control {
      background: rgba(255, 255, 255, 0.96);
      border-color: rgba(255, 215, 0, 0.35);
      color: #1a1a1a;
      font-size: 1rem;
    }
    .auth-card-body .form-control:focus { border-color: #ffd700; box-shadow: 0 0 0 0.2rem rgba(255, 215, 0, 0.25); }
    .btn-auth-primary {
      background: linear-gradient(180deg, #ffd700 0%, #e6c200 100%);
      border: none;
      color: #1a1a1a !important;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    .btn-auth-primary:hover { background: linear-gradient(180deg, #ffe033 0%, #ffd700 100%); color: #0d0d0d !important; }
    .auth-card-footer { text-align: center; padding: 0 1.75rem 1.75rem; }
    .btn-auth-outline {
      border: 2px solid rgba(255, 215, 0, 0.45);
      color: #ffd700 !important;
      font-weight: 600;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      background: transparent;
    }
    .btn-auth-outline:hover { background: rgba(255, 215, 0, 0.12); border-color: #ffd700; color: #fff !important; }
    .btn-auth-link { color: rgba(255, 255, 255, 0.85) !important; border-color: rgba(255, 255, 255, 0.25) !important; }
    .btn-auth-link:hover { background: rgba(255, 255, 255, 0.08); color: #fff !important; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="brand-icon"><i class="bi bi-shop"></i></div>
      <h1>{% block card_title %}Olla y Sazón{% endblock %}</h1>
      <p class="subtitle">{% block card_subtitle %}{% endblock %}</p>
    </div>
    <div class="auth-card-body">
      {% block auth_body %}{% endblock %}
    </div>
    <div class="auth-card-footer">
      {% block auth_footer %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
